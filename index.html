<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKJ Competition Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
:root {
  --red:#e60235; --red-l:#fff0f3; --red-m:#ffd6df; --red-d:#b50029;
  --black:#111; --g9:#1a1a1a; --g7:#444; --g5:#777; --g4:#999;
  --g3:#ccc; --g2:#e0e0e0; --g1:#f4f4f4; --g0:#fafafa;
  --white:#fff; --border:#e8e8e8;
  --font:'Pretendard',sans-serif; --mono:'Pretendard',sans-serif;
  --sw:260px; --hh:60px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--font);background:var(--white);color:var(--black);font-size:14px;line-height:1.6;}
button,input,textarea,select{font-family:var(--font);}
button{cursor:pointer;}

/* HEADER */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hh);background:var(--white);border-bottom:2px solid var(--red);display:flex;align-items:center;justify-content:space-between;padding:0 28px;z-index:200;}
.logo{display:flex;align-items:center;}
.logo-sq{width:30px;height:30px;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:500;font-family:var(--mono);}
.hdr-r{display:flex;align-items:center;gap:8px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;font-size:13px;border:1px solid var(--border);background:var(--white);color:var(--g7);transition:all .13s;white-space:nowrap;cursor:pointer;}
.btn:hover{border-color:var(--g3);background:var(--g0);}
.btn-p{background:var(--red);border-color:var(--red);color:#fff;font-weight:500;}
.btn-p:hover{background:var(--red-d);border-color:var(--red-d);}
.btn-ghost{border-color:transparent;background:transparent;}
.btn-ghost:hover{background:var(--g1);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-danger{border-color:var(--red);color:var(--red);}
.btn-danger:hover{background:var(--red-l);}
.btn-outline{border-color:var(--red);color:var(--red);background:var(--white);}
.btn-outline:hover{background:var(--red-l);}

/* LAYOUT */
.app{display:flex;padding-top:var(--hh);min-height:100vh;}
.sidebar{width:var(--sw);flex-shrink:0;border-right:1px solid var(--border);position:fixed;top:var(--hh);bottom:0;left:0;overflow-y:auto;background:var(--g0);}
.sb-top{padding:20px 16px 8px;}
.sb-label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--g4);margin-bottom:8px;}
.pi{padding:11px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;}
.pi:hover{background:var(--white);border-left-color:var(--g2);}
.pi.active{background:var(--white);border-left-color:var(--red);}
.pi-name{font-size:13px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pi-meta{display:flex;align-items:center;gap:6px;margin-top:4px;}
.db{font-family:var(--mono);font-size:10px;padding:1px 7px;border:1px solid;}
.db-ok{border-color:var(--g3);color:var(--g5);}
.db-warn{border-color:#f59e0b;color:#d97706;background:#fffbeb;}
.db-danger{border-color:var(--red);color:var(--red);background:var(--red-l);}
.dp{font-family:var(--mono);font-size:10px;color:var(--g4);}

/* MAIN */
.main{margin-left:var(--sw);flex:1;padding:36px 40px;min-height:calc(100vh - var(--hh));}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:14px;text-align:center;}
.empty-box{width:48px;height:48px;border:2px solid var(--g2);display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:22px;color:var(--g3);}
.empty-txt{font-size:13px;color:var(--g4);}

/* DETAIL */
.proj-title{font-size:22px;font-weight:700;line-height:1.3;margin-bottom:4px;}
.proj-sub{font-size:13px;color:var(--g5);margin-bottom:16px;}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:28px;}
.tag{font-family:var(--mono);font-size:11px;padding:3px 9px;border:1px solid var(--border);color:var(--g7);}
.tag-r{border-color:var(--red);color:var(--red);background:var(--red-l);}
.tag-b{border-color:#3b82f6;color:#2563eb;background:#eff6ff;}

/* COUNTDOWN */
.cd-bar{display:flex;border:1px solid var(--border);margin-bottom:32px;}
.cd-cell{padding:16px 22px;flex:1;}
.cd-cell+.cd-cell{border-left:1px solid var(--border);}
.cd-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--g4);margin-bottom:5px;}
.cd-val{font-family:var(--mono);font-size:22px;font-weight:500;}
.cd-ok{color:#16a34a;} .cd-warn{color:#d97706;} .cd-danger{color:var(--red);}
.prog-track{height:3px;background:var(--g1);margin-top:10px;}
.prog-fill{height:100%;background:var(--red);transition:width .4s ease;}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));border:1px solid var(--border);margin-bottom:28px;}
.ic{padding:13px 15px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}
.ic-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--g4);margin-bottom:4px;}
.ic-val{font-size:13px;font-weight:500;}

/* STAGE TABS */
.stage-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px;overflow-x:auto;}
.stab{padding:10px 18px;font-size:11px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;border:none;background:none;color:var(--g4);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .12s;}
.stab:hover{color:var(--black);}
.stab.active{color:var(--red);border-bottom-color:var(--red);font-weight:500;}
.stab.s-done{color:var(--g3);}

/* AI PANEL */
.ai-panel{border:1px solid var(--border);margin-bottom:32px;}
.ai-ph{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--g0);border-bottom:1px solid var(--border);}
.ai-pt{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--g7);display:flex;align-items:center;gap:8px;}
.ai-bw{font-size:10px;padding:2px 7px;font-weight:500;font-family:var(--mono);}
.bg{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;}
.bc{background:var(--red-l);color:var(--red);border:1px solid var(--red-m);}
.ai-body{padding:16px;}
.ai-desc{font-size:12px;color:var(--g5);margin-bottom:12px;}
.ai-shortcuts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.ai-sc{padding:5px 11px;font-size:11px;font-family:var(--mono);border:1px solid var(--border);background:white;color:var(--g7);cursor:pointer;transition:all .12s;}
.ai-sc:hover{border-color:var(--red);color:var(--red);background:var(--red-l);}
.ai-row{display:flex;gap:7px;}
.ai-inp{flex:1;padding:8px 12px;border:1px solid var(--border);font-size:13px;outline:none;transition:border-color .13s;}
.ai-inp:focus{border-color:var(--red);}
.ai-sel{padding:8px 10px;border:1px solid var(--border);background:white;font-size:11px;font-family:var(--mono);color:var(--g7);outline:none;}
.ai-run{padding:8px 16px;background:var(--red);border:none;color:white;font-size:12px;font-family:var(--mono);cursor:pointer;white-space:nowrap;}
.ai-run:hover{background:var(--red-d);}
.ai-loading{display:none;align-items:center;gap:10px;padding:14px 0;color:var(--g5);font-size:12px;font-family:var(--mono);}
.ai-loading.show{display:flex;}
.spinner{width:15px;height:15px;border:2px solid var(--g2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.ai-out{display:none;margin-top:12px;}
.ai-out.show{display:block;}
.ai-out-sec{margin-bottom:14px;}
.ai-out-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.ai-out-lbl.g{color:#2e7d32;} .ai-out-lbl.c{color:var(--red);}
.ai-out-box{padding:12px 14px;font-size:12px;line-height:1.8;color:var(--g7);white-space:pre-wrap;border:1px solid var(--border);background:var(--g0);max-height:180px;overflow-y:auto;}
.ai-out-box.cl{font-size:13px;color:var(--g9);background:white;max-height:none;}
.step-ind{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-family:var(--mono);font-size:11px;}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--g2);}
.sdot.active{background:var(--red);} .sdot.done{background:#16a34a;}
.slbl{color:var(--g4);} .slbl.active{color:var(--red);} .slbl.done{color:#16a34a;}

/* DEBUG PANEL */
.debug-panel{display:none;background:#1a1a1a;color:#00ff88;font-family:var(--mono);font-size:11px;padding:12px 14px;margin-top:8px;line-height:1.8;max-height:200px;overflow-y:auto;white-space:pre-wrap;}
.debug-panel.show{display:block;}
.debug-toggle{font-family:var(--mono);font-size:10px;color:var(--g4);cursor:pointer;text-decoration:underline;margin-top:8px;display:inline-block;}

/* CHECKLIST */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sec-ttl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--g4);}
.chk-list{border-top:1px solid var(--border);}
.chk-item{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.chk-item:hover{background:var(--g0);margin:0 -8px;padding:11px 8px;}
.chkbox{width:16px;height:16px;border:1.5px solid var(--g3);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .13s;}
.chkbox.on{background:var(--red);border-color:var(--red);}
.chkbox.on::after{content:'';width:8px;height:5px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px);display:block;}
.chk-txt{font-size:13px;line-height:1.5;}
.chk-txt.done{color:var(--g3);text-decoration:line-through;}
.chk-sub{font-family:var(--mono);font-size:11px;color:var(--g4);margin-top:2px;}

/* PROGRAM TABLE */
.prog-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:13px;}
.prog-table th{background:var(--g0);padding:8px 12px;text-align:left;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--g5);border:1px solid var(--border);font-weight:400;}
.prog-table td{padding:8px 12px;border:1px solid var(--border);vertical-align:middle;}
.prog-table td:last-child{text-align:right;font-family:var(--mono);}
.prog-table tr.cat-row td{background:var(--g0);font-weight:500;color:var(--g7);}
.prog-table .del-btn{background:none;border:none;color:var(--g3);cursor:pointer;font-size:14px;padding:0 4px;}
.prog-table .del-btn:hover{color:var(--red);}
.prog-total{display:flex;justify-content:flex-end;padding:8px 12px;font-family:var(--mono);font-size:12px;color:var(--g7);border:1px solid var(--border);border-top:none;background:var(--g0);}
.prog-total span{color:var(--red);font-weight:500;margin-left:8px;}

/* PROGRAM INPUT */
.prog-input-row{display:grid;grid-template-columns:1fr 1.5fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px;}
.prog-input-row input{padding:8px 10px;border:1px solid var(--border);font-size:13px;outline:none;transition:border-color .13s;width:100%;}
.prog-input-row input:focus{border-color:var(--red);}
.prog-input-row .add-btn{padding:8px 14px;background:var(--red);border:none;color:white;font-size:12px;font-family:var(--mono);cursor:pointer;white-space:nowrap;}

/* NOTES */
.notes-area{width:100%;padding:12px 14px;border:1px solid var(--border);background:white;font-size:13px;color:var(--black);resize:vertical;min-height:100px;outline:none;line-height:1.7;font-weight:300;transition:border-color .13s;}
.notes-area:focus{border-color:var(--red);}
.section{margin-bottom:32px;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.35);align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:white;border:1px solid var(--border);width:680px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 4px 24px rgba(0,0,0,.1);}
.modal-hd{padding:18px 24px;border-bottom:2px solid var(--red);display:flex;align-items:center;justify-content:space-between;}
.modal-ttl{font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px;}
.modal-x{background:none;border:none;font-size:22px;color:var(--g4);cursor:pointer;line-height:1;}
.modal-x:hover{color:var(--black);}
.modal-body{padding:24px;}
.modal-ft{padding:0 24px 24px;display:flex;justify-content:flex-end;gap:8px;}
.field{margin-bottom:18px;}
.field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--g4);margin-bottom:7px;}
.field input,.field textarea,.field select{width:100%;padding:9px 12px;border:1px solid var(--border);font-size:13px;outline:none;transition:border-color .13s;background:white;color:var(--black);}
.field input:focus,.field textarea:focus{border-color:var(--red);}
.field textarea{resize:vertical;min-height:70px;font-weight:300;line-height:1.7;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

/* FILE UPLOAD ZONE */
.upload-zone{border:1px dashed var(--red);background:var(--red-l);padding:20px;text-align:center;cursor:pointer;transition:all .13s;position:relative;}
.upload-zone:hover{background:var(--red-m);}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-zone-txt{font-family:var(--mono);font-size:12px;color:var(--red);}
.upload-zone-sub{font-size:11px;color:var(--g5);margin-top:4px;}
.upload-status{font-family:var(--mono);font-size:11px;padding:8px 12px;margin-top:8px;border:1px solid var(--border);display:none;align-items:center;gap:8px;}
.upload-status.show{display:flex;}
.upload-status.ok{border-color:#16a34a;color:#16a34a;background:#f0fdf4;}
.upload-status.err{border-color:var(--red);color:var(--red);background:var(--red-l);}

/* URL INPUT */
.url-row{display:flex;gap:8px;}
.url-row input{flex:1;padding:9px 12px;border:1px solid var(--border);font-size:13px;outline:none;transition:border-color .13s;}
.url-row input:focus{border-color:var(--red);}
.url-analyze-btn{padding:9px 16px;background:var(--red);border:none;color:white;font-size:12px;font-family:var(--mono);cursor:pointer;white-space:nowrap;}
.url-analyze-btn:hover{background:var(--red-d);}
.url-analyze-btn:disabled{opacity:.4;cursor:not-allowed;}

.a-loading{display:none;align-items:center;gap:9px;padding:10px 0;font-family:var(--mono);font-size:11px;color:var(--g5);}
.a-loading.show{display:flex;}
.ai-prev{display:none;border:1px solid var(--border);background:var(--g0);padding:14px;margin-top:14px;}
.ai-prev.show{display:block;}
.prev-row{display:flex;gap:10px;font-family:var(--mono);font-size:11px;margin-bottom:5px;line-height:1.5;}
.prev-k{color:var(--red);min-width:80px;flex-shrink:0;}
.prev-v{color:var(--g7);}
.divtxt{text-align:center;font-family:var(--mono);font-size:10px;color:var(--g3);padding:14px 0;position:relative;}
.divtxt::before,.divtxt::after{content:'';position:absolute;top:50%;width:44%;height:1px;background:var(--border);}
.divtxt::before{left:0;} .divtxt::after{right:0;}
.section-sep{border:none;border-top:1px solid var(--border);margin:20px 0;}

/* DRAWER */
.drawer{position:fixed;top:var(--hh);right:0;bottom:0;width:320px;z-index:300;background:white;border-left:1px solid var(--border);transform:translateX(100%);transition:transform .2s ease;overflow-y:auto;padding:24px;}
.drawer.open{transform:translateX(0);}
.drw-ttl{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--g4);margin-bottom:20px;}

::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--g2);}
.hidden{display:none!important;}

/* PROG ADD SECTION */
.prog-add-wrap{border:1px solid var(--border);padding:16px;margin-bottom:8px;background:var(--g0);}
.prog-add-ttl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--g4);margin-bottom:12px;}
</style>
</head>

<!-- SETTINGS DRAWER -->
<div class="drawer" id="drawer">
  <div class="drw-ttl">설정</div>
  <div class="field">
    <label>Gemini API 키</label>
    <input type="password" id="gkey-inp" placeholder="AIza..." />
    <div style="font-family:var(--mono);font-size:10px;color:var(--g4);margin-top:5px">Google AI Studio 발급 · localStorage 저장</div>
  </div>
  <button class="btn btn-p" style="width:100%;margin-bottom:8px" onclick="saveKey()">저장</button>
  <button class="btn btn-sm" style="width:100%;margin-bottom:20px;font-family:var(--mono);font-size:11px" onclick="testGemini()">⚡ Gemini 연결 테스트</button>
  <div id="gtest-result" style="display:none;font-family:var(--mono);font-size:11px;padding:10px;border:1px solid var(--border);margin-bottom:16px;white-space:pre-wrap;"></div>
  <hr class="section-sep">
  <div class="field"><label>데이터 내보내기</label><button class="btn" style="width:100%" onclick="exportData()">JSON 내보내기</button></div>
  <div class="field"><label>데이터 가져오기</label><input type="file" id="imp-file" accept=".json" onchange="importData(event)" style="font-size:12px;color:var(--g5)" /></div>
  <hr class="section-sep">
  <button class="btn btn-danger" style="width:100%" onclick="clearAll()">모든 데이터 초기화</button>
</div>

<!-- ADD PROJECT MODAL -->
<div class="overlay" id="add-modal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-ttl"><div class="logo-sq" style="width:22px;height:22px;font-size:9px">+</div>새 공모 프로젝트</div>
      <button class="modal-x" onclick="closeAdd()">×</button>
    </div>
    <div class="modal-body">

      <!-- STEP 1: 공모 페이지 URL -->
      <div class="field">
        <label>공모 페이지 URL</label>
        <div class="url-row">
          <input type="url" id="brief-url" placeholder="https://공모 안내 페이지 URL..." />
          <button class="url-analyze-btn" id="btn-url" onclick="analyzeURL()">⚡ Gemini 분석</button>
        </div>
      </div>

      <div class="divtxt">또는</div>

      <!-- STEP 2: 파일 업로드 -->
      <div class="field">
        <label>지침서 파일 업로드 <span style="font-weight:300;text-transform:none;letter-spacing:0">(PDF, DOCX만 지원 · HWP 불가)</span></label>
        <div class="upload-zone">
          <input type="file" id="brief-file" accept=".pdf,.docx" onchange="handleFile(event)" />
          <div class="upload-zone-txt">📄 파일을 클릭하거나 드래그해서 올리세요</div>
          <div class="upload-zone-sub">PDF · DOCX 지원 / 최대 20MB</div>
        </div>
        <div class="upload-status" id="upload-status"></div>
      </div>

      <div class="a-loading" id="a-loading"><div class="spinner"></div><span id="a-loading-txt">Gemini 분석 중...</span></div>
      <div class="ai-prev" id="ai-prev"></div>

      <hr class="section-sep">
      <div style="font-family:var(--mono);font-size:10px;color:var(--g4);margin-bottom:16px;letter-spacing:.1em;text-transform:uppercase">공모 정보 입력 (자동완성 또는 수동 입력)</div>

      <!-- 기본 정보 -->
      <div class="field"><label>공모명 *</label><input type="text" id="f-name" placeholder="예: 서울창업허브 관악 설계공모" /></div>
      <div class="field-row" style="margin-bottom:18px">
        <div class="field" style="margin-bottom:0"><label>마감일 *</label><input type="date" id="f-deadline" /></div>
        <div class="field" style="margin-bottom:0"><label>발주처</label><input type="text" id="f-client" placeholder="예: SBA 서울산업진흥원" /></div>
      </div>
      <div class="field-row" style="margin-bottom:18px">
        <div class="field" style="margin-bottom:0"><label>사이트 위치</label><input type="text" id="f-location" placeholder="예: 서울시 관악구 봉천동" /></div>
        <div class="field" style="margin-bottom:0"><label>대지면적</label><input type="text" id="f-site-area" placeholder="예: 3,200㎡" /></div>
      </div>
      <div class="field-row3" style="margin-bottom:18px">
        <div class="field" style="margin-bottom:0"><label>건축물 주 용도</label><input type="text" id="f-usage" placeholder="예: 업무시설" /></div>
        <div class="field" style="margin-bottom:0"><label>연면적</label><input type="text" id="f-area" placeholder="예: 12,500㎡" /></div>
        <div class="field" style="margin-bottom:0"><label>예정 설계비</label><input type="text" id="f-design-fee" placeholder="예: 약 5억원" /></div>
      </div>
      <div class="field-row" style="margin-bottom:18px">
        <div class="field" style="margin-bottom:0"><label>예정 공사비</label><input type="text" id="f-budget" placeholder="예: 약 200억원" /></div>
        <div class="field" style="margin-bottom:0"><label>제출물 규격</label><input type="text" id="f-deliverables" placeholder="예: A1 패널 5매, 설명서 A4 20p" /></div>
      </div>
      <div class="field"><label>심사위원 / 특이사항</label><textarea id="f-notes" style="min-height:60px" placeholder="심사 전략, 가점 요인, 주의사항..."></textarea></div>

      <!-- 요구 프로그램 -->
      <hr class="section-sep">
      <div style="font-family:var(--mono);font-size:10px;color:var(--g4);margin-bottom:14px;letter-spacing:.1em;text-transform:uppercase">요구 프로그램</div>
      <div class="prog-add-wrap">
        <div class="prog-add-ttl">항목 추가</div>
        <div class="prog-input-row">

// ── GEMINI API ─────────────────────────────────────────────────────
async function geminiCall(prompt, useSearch = false) {
  const key = getKey();
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${key}`;
  const body = { contents: [{ parts: [{ text: prompt }] }] };
  if (useSearch) body.tools = [{ googleSearch: {} }];

  dbg(`[Gemini] calling... useSearch=${useSearch}`);
  dbg(`[Gemini] URL: ${url.replace(key, key.slice(0,8)+'...')}`);

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  const data = await res.json();
  dbg(`[Gemini] status: ${res.status}`);

  if (!res.ok) {
    const msg = data.error?.message || JSON.stringify(data);
    dbg(`[Gemini] ERROR: ${msg}`);
    throw new Error(`Gemini API 오류 (${res.status}): ${msg}`);
  }

  const text = data.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('') || '';
  dbg(`[Gemini] OK, ${text.length}자 응답`);
  return text;
}

// ── FILE HANDLING ──────────────────────────────────────────────────
async function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const status = $('upload-status');
  status.className = 'upload-status show';
  status.innerHTML = `<div class="spinner"></div> <span>${file.name} 읽는 중...</span>`;

  try {
    let text = '';
    if (file.name.endsWith('.pdf')) {
      text = await extractPDF(file);
    } else if (file.name.endsWith('.docx')) {
      text = await extractDOCX(file);
    } else {
      throw new Error('PDF 또는 DOCX 파일만 지원합니다.');
    }

    if (text.length < 50) throw new Error('파일에서 텍스트를 추출할 수 없습니다. 스캔 이미지 PDF일 수 있습니다.');

    status.className = 'upload-status show ok';
    status.innerHTML = `✓ ${file.name} (${text.length.toLocaleString()}자 추출) — Gemini 분석 시작`;

    await analyzeText(text);

  } catch(e) {
    status.className = 'upload-status show err';
    status.innerHTML = '✗ ' + e.message;
  }
}

async function extractPDF(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let text = '';
  for (let i = 1; i <= Math.min(pdf.numPages, 30); i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(item => item.str).join(' ') + '\n';
  }
  return text;
}

async function extractDOCX(file) {
  const arrayBuffer = await file.arrayBuffer();
  const result = await mammoth.extractRawText({ arrayBuffer });
  return result.value;
}

    set('f-site-area', d.site_area);
    set('f-usage', d.usage);
    set('f-area', d.area);

    set('f-budget', d.budget);
    set('f-deliverables', d.deliverables);
    set('f-notes', d.key_notes);

  projects.unshift({

    notes: $('f-notes').value,
    programs: [...modalProgs],

    stageNotes: {},

  const list = $('plist');

  if (!projects.length) {
    list.innerHTML = '<div style="padding:12px 16px;font-size:12px;color:var(--g3);font-family:var(--mono)">—</div>';
    return;
  }
  list.innerHTML = projects.map(p => {
    const days = daysLeft(p.deadline);
    const bc = days===null?'db-ok':days<0?'db-danger':days<=7?'db-warn':'db-ok';
    const bt = days===null?'—':days<0?`D+${Math.abs(days)}`:days===0?'D-Day':`D-${days}`;
    const pct = calcPct(p);
    const act = p.id===curId?' active':'';
    return `<div class="pi${act}" onclick="selectProj('${p.id}')">
      <div class="pi-name">${p.name}</div>
      <div class="pi-meta"><span class="db ${bc}">${bt}</span><span class="dp">${pct}%</span></div>
    </div>`;
  }).join('');
}

function render() {
  const p = projects.find(x => x.id === curId);
  if (!p) return;

  const days = daysLeft(p.deadline);
  const dc = days===null?'ok':days<0?'danger':days<=14?'warn':'ok';
  const dt = days===null?'마감일 미설정':days<0?`마감 ${Math.abs(days)}일 경과`:days===0?'D-Day!':`D-${days}`;
  const pct = calcPct(p);
  const sk = STAGES[curStage].key;
  const checks = p.checklists?.[sk] || [];
  const tasks = AI_TASKS[sk] || [];

  const tabs = STAGES.map((s,i) => {
    const items = p.checklists?.[s.key]||[];
    const done = items.filter(x=>x.done).length;
    const all = items.length;
    const cls = i===curStage?' active':(done===all&&all>0?' s-done':'');
    return `<button class="stab${cls}" onclick="switchStage(${i})">${s.short} ${s.label}${all?` (${done}/${all})`:''}</button>`;

  const checkHTML = checks.map((item,i)=>`

        <div>
          <div class="proj-title">${p.name}</div>

      </div>
      <div class="tags">
        ${p.area?`<span class="tag tag-r">${p.area}</span>`:''}
        ${p.siteArea?`<span class="tag">대지 ${p.siteArea}</span>`:''}

    </div>

      </div>
      <div class="cd-cell" style="flex:2">
        <div class="cd-lbl">전체 진행률 — ${pct}%</div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>

    <div class="info-grid section">
      ${p.location?`<div class="ic"><div class="ic-lbl">사이트 위치</div><div class="ic-val" style="font-size:12px">${p.location}</div></div>`:''}
      ${p.siteArea?`<div class="ic"><div class="ic-lbl">대지면적</div><div class="ic-val" style="font-family:var(--mono)">${p.siteArea}</div></div>`:''}
      ${p.usage?`<div class="ic"><div class="ic-lbl">건축물 주 용도</div><div class="ic-val">${p.usage}</div></div>`:''}
      ${p.area?`<div class="ic"><div class="ic-lbl">연면적</div><div class="ic-val" style="font-family:var(--mono)">${p.area}</div></div>`:''}
      ${p.designFee?`<div class="ic"><div class="ic-lbl">예정 설계비</div><div class="ic-val" style="font-family:var(--mono)">${p.designFee}</div></div>`:''}

    ${progHTML}

    <div class="stage-tabs">${tabs}</div>

    <div class="ai-panel section">
      <div class="ai-ph">
        <div class="ai-pt">AI 업무 지원 <span class="ai-bw bg">Gemini</span> <span style="color:var(--g3);font-size:10px">→</span> <span class="ai-bw bc">Claude</span></div>
      </div>
      <div class="ai-body">
        <div class="ai-desc">Gemini가 인터넷을 조사해 초안을 작성하고, Claude가 건축 실무 관점으로 분석·정제합니다</div>
        <div class="ai-shortcuts">${shortcutsHTML}</div>

    <div class="section">
      <div class="sec-hdr">
        <div class="sec-ttl">${STAGES[curStage].label} 체크리스트</div>
        <button class="btn btn-ghost btn-sm" onclick="addCheck('${sk}')">+ 추가</button>
      </div>
      <div class="chk-list">${checkHTML||'<div style="padding:12px 0;font-size:12px;color:var(--g4)">항목 없음</div>'}</div>
    </div>

    <!-- NOTES -->
    <div class="section">
      <div class="sec-ttl" style="margin-bottom:10px">전략 메모</div>
      <textarea class="notes-area" id="snotes" placeholder="이 단계의 전략, 아이디어, AI 결과 요약..."
        onblur="saveNote(this.value)">${p.stageNotes?.[sk]||''}</textarea>
    </div>

// ── DEBUG ──────────────────────────────────────────────────────────
let debugLog = '';
function dbg(msg) {
  const ts = new Date().toLocaleTimeString('ko-KR', {hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  debugLog += `[${ts}] ${msg}\n`;
  const el = $('debug-panel');
  if (el) { el.textContent = debugLog; el.scrollTop = el.scrollHeight; }
}
function toggleDebug() {
  const el = $('debug-panel');
  if (el) el.classList.toggle('show');
}

// ── AI PIPELINE ────────────────────────────────────────────────────
function buildCtx(p, sk) {
  return `공모명: ${p.name}\n발주처: ${p.client||'—'}\n위치: ${p.location||'—'}\n연면적: ${p.area||'—'}\n공사비: ${p.budget||'—'}\n마감일: ${p.deadline||'—'}\n현재단계: ${STAGES.find(s=>s.key===sk)?.label||'—'}`;
}

function gPrompt(label, type, ctx) {
  const base = `아래는 건축 현상설계 공모 정보입니다:\n\n${ctx}\n\n`;
  const map = {
    research: `${base}[리서치] ${label}\n\n최신 정보를 조사하고 구체적 사실·수치·사례를 포함해 정리하세요. 출처를 명시하세요.`,
    casestudy: `${base}[사례조사] ${label}\n\n유사 국내외 건축 사례 3~5개를 조사해 각각 프로젝트명, 위치, 규모, 핵심 디자인 전략, 이 공모에의 시사점을 정리하세요.`,
    brainstorm: `${base}[브레인스톰] ${label}\n\n창의적 아이디어를 다양하게 제안하세요. 형식에 얽매이지 말고 최대한 많은 방향을 제시하세요.`,
    analysis: `${base}[분석] ${label}\n\n핵심 포인트, 주의사항, 전략적 판단 사항을 실무 관점에서 정리하세요.`,
    draft: `${base}[초안 작성] ${label}\n\n실제 제출에 활용 가능한 수준으로 구체적으로 작성하세요.`,
  };
  return map[type] || map.analysis;
}

function cPrompt(label, ctx, gOut) {
  return `당신은 건축 현상설계 전문 컨설턴트입니다.

[공모 정보]
${ctx}

[Gemini 조사·초안]
${gOut}

[요청]
1. 건축 실무 관점에서 Gemini 결과를 검토하고 보완점을 지적하세요
2. "${label}"에 대해 실제 활용 가능한 최종 결과물을 정리하세요
3. 이 공모의 경쟁력을 높이는 핵심 인사이트 1~2가지를 추가하세요

간결하고 실용적으로. [섹션명] 형식으로 구분하세요.`;
}

async function runTask(label, type, sk) {
  const p = projects.find(x => x.id === curId);
  await pipeline(label, type, buildCtx(p, sk));
}

async function runCustom() {
  const input = $('ai-inp').value.trim();
  if (!input) return;
  const p = projects.find(x => x.id === curId);
  await pipeline(input, $('ai-sel').value, buildCtx(p, STAGES[curStage].key));
}

async function pipeline(label, type, ctx) {
  debugLog = '';
  const loading = $('ai-loading');
  const ltxt = $('ai-ltxt');
  const out = $('ai-out');
  const inner = $('ai-inner');
  const sd1=$('sd1'),sl1=$('sl1'),sd2=$('sd2'),sl2=$('sl2');

  loading.classList.add('show');
  out.classList.remove('show');
  inner.innerHTML = '';

  // Step 1: Gemini
  ltxt.textContent = '① Gemini 조사·초안 작성 중...';
  sd1.className='sdot active'; sl1.className='slbl active';
  sd2.className='sdot'; sl2.className='slbl';

  let gOut = '';
  try {
    gOut = await geminiCall(gPrompt(label, type, ctx), true);
  } catch(e) {
    // retry without search
    try {
      dbg('[Gemini] 검색 없이 재시도...');
      gOut = await geminiCall(gPrompt(label, type, ctx), false);
    } catch(e2) {
      gOut = `⚠ Gemini 오류: ${e2.message}`;
    }
  }

  // Step 2: Claude
  ltxt.textContent = '② Claude 분석·정제 중...';
  sd1.className='sdot done'; sl1.className='slbl done';
  sd2.className='sdot active'; sl2.className='slbl active';

  let cOut = '';
  try {
    dbg('[Claude] calling Anthropic API...');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:cPrompt(label,ctx,gOut)}]
      })
    });
    dbg(`[Claude] status: ${res.status}`);
    const d = await res.json();
    if (res.ok) {
      cOut = d.content?.map(b=>b.text||'').join('') || '응답 없음';
      dbg(`[Claude] OK, ${cOut.length}자`);
    } else {
      cOut = `⚠ Claude 오류 (${res.status}): ${d.error?.message||JSON.stringify(d)}`;
      dbg(`[Claude] ERROR: ${cOut}`);
    }
  } catch(e) {
    cOut = `⚠ Claude 연결 오류: ${e.message}`;
    dbg(`[Claude] EXCEPTION: ${e.message}`);
  }

  loading.classList.remove('show');
  sd1.className='sdot done'; sl1.className='slbl done';
  sd2.className='sdot done'; sl2.className='slbl done';
  out.classList.add('show');

  inner.innerHTML = `
    <div class="ai-out-sec">
      <div class="ai-out-lbl g">① Gemini — 조사·초안</div>
      <div class="ai-out-box">${gOut}</div>
    </div>
    <div class="ai-out-sec">
      <div class="ai-out-lbl c">② Claude — 분석·정제</div>
      <div class="ai-out-box cl">${cOut}</div>
    </div>`;
}

// ── CRUD ───────────────────────────────────────────────────────────
function toggleCheck(sk, i) {
  const p = projects.find(x=>x.id===curId);
  if (!p?.checklists?.[sk]) return;
  p.checklists[sk][i].done = !p.checklists[sk][i].done;
  save(); render(); renderSidebar();
}
function addCheck(sk) {
  const t = prompt('새 체크리스트 항목:'); if(!t) return;
  const p = projects.find(x=>x.id===curId);
  p.checklists[sk].push({text:t,sub:'',done:false}); save(); render();
}
function saveNote(val) {
  const p = projects.find(x=>x.id===curId); if(!p) return;
  if(!p.stageNotes)p.stageNotes={};
  p.stageNotes[STAGES[curStage].key]=val; save();
}
function switchStage(i){ curStage=i; render(); }
function deleteProj(id) {
  if(!confirm('삭제하시겠습니까?'))return;
  projects=projects.filter(p=>p.id!==id); save(); curId=null;
  $('detail').classList.add('hidden'); $('empty').classList.remove('hidden'); renderSidebar();
}
function editProgs(id) {
  // 간단히 alert로 안내 (추후 프로그램 편집 모달 추가 예정)
  alert('프로그램 편집 기능은 다음 업데이트에서 추가됩니다.\n현재는 삭제 후 새로 추가해주세요.');
}

// ── HELPERS ────────────────────────────────────────────────────────
function daysLeft(d){ if(!d)return null; return Math.ceil((new Date(d)-new Date())/86400000); }
function calcPct(p){ let t=0,d=0; STAGES.forEach(s=>{const it=p.checklists?.[s.key]||[];t+=it.length;d+=it.filter(i=>i.done).length;}); return t?Math.round(d/t*100):0; }

// ── MODAL ──────────────────────────────────────────────────────────
function openAdd(){
  modalProgs=[];
  $('add-modal').classList.add('open');
  ['f-name','f-deadline','f-client','f-location','f-site-area','f-usage','f-area','f-design-fee','f-budget','f-deliverables','f-notes','brief-url','pi-cat','pi-prog','pi-area'].forEach(id=>{$(id).value='';});
  $('brief-file').value='';
  $('ai-prev').classList.remove('show');
  $('upload-status').className='upload-status';
  renderModalProgTable();
}
function closeAdd(){ $('add-modal').classList.remove('open'); }

// ── DRAWER ─────────────────────────────────────────────────────────
function toggleDrawer(){ $('drawer').classList.toggle('open'); $('gkey-inp').value=getKey(); }
function saveKey(){ localStorage.setItem('gemini_key',$('gkey-inp').value.trim()); alert('저장됐습니다.'); }

// ── EXPORT / IMPORT ────────────────────────────────────────────────
function exportData(){ const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(projects,null,2)],{type:'application/json'}));a.download=`competition_${new Date().toISOString().slice(0,10)}.json`;a.click(); }
function importData(e){ const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(Array.isArray(d)){projects=[...d,...projects];save();renderSidebar();alert(`${d.length}개 가져왔습니다.`);}}catch{alert('파일 오류');}};r.readAsText(f); }
function clearAll(){ if(!confirm('모두 삭제?'))return;projects=[];save();curId=null;$('detail').classList.add('hidden');$('empty').classList.remove('hidden');renderSidebar(); }

// ── INIT ───────────────────────────────────────────────────────────
renderSidebar();
if(projects.length) selectProj(projects[0].id);
</script>
